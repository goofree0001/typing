<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>グラフ記録付きタイピングゲーム</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; padding-top: 30px; background-color: #f0f0f0; }
        #file-area { background-color: #fff; border: 2px dashed #ccc; padding: 20px; max-width: 400px; margin: 0 auto 20px auto; border-radius: 8px; }
        #status-container { font-size: 20px; margin-bottom: 20px; color: #333; display: none; }
        #japanese-display { font-size: 28px; color: #555; margin-bottom: 10px; }
        #word-display { font-size: 48px; letter-spacing: 2px; margin-bottom: 20px; display: none; }
        .correct { color: #ccc; }
        #message { font-size: 24px; color: #2c3e50; height: 120px; white-space: pre-wrap; line-height: 1.6; }
        #start-btn, #reset-btn { font-size: 20px; padding: 10px 30px; cursor: pointer; color: white; border: none; border-radius: 5px; margin: 5px; }
        #start-btn { background-color: #4CAF50; display: none; }
        #reset-btn { background-color: #f44336; }
        .miss-flash { background-color: #ffcccc !important; }
        #chart-container { max-width: 600px; margin: 30px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body id="game-body">

    <h1>タイピングゲーム（成長グラフ付き）</h1>
    
    <div id="file-area">
        <p style="margin-top:0;">問題ファイル（.txt）を選んでください</p>
        <input type="file" id="file-input" accept=".txt">
    </div>

    <div id="status-container">
        <span>残り時間: <span id="timer">30</span> 秒</span>
    </div>

    <button id="start-btn">ゲームを始める</button>

    <div id="japanese-display"></div>
    <div id="word-display"></div>
    <div id="message"></div>

    <div id="chart-container">
        <canvas id="scoreChart"></canvas>
        <button id="reset-btn">データを初期化する</button>
    </div>

    <script src="chart.js"></script>

    <script>
        let words = []; 
        let currentQuestion = null; let currentWord = ''; let charIndex = 0; let isPlaying = false;
        let totalCorrectTypes = 0; let totalMissTypes = 0; let timeLeft = 30; let timerInterval = null;
        let myChart = null; 

        const fileInput = document.getElementById('file-input'); const fileArea = document.getElementById('file-area');
        const startBtn = document.getElementById('start-btn'); const statusContainer = document.getElementById('status-container');
        const japaneseDisplay = document.getElementById('japanese-display'); const wordDisplay = document.getElementById('word-display');
        const messageDisplay = document.getElementById('message'); const gameBody = document.getElementById('game-body'); const timerDisplay = document.getElementById('timer');

        function playTone(frequency, type, duration) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const oscillator = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
                oscillator.type = type; oscillator.frequency.value = frequency;
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + duration);
            } catch (error) {
                console.warn("オーディオエラーを回避しました:", error);
            }
        }
        
        function playTypeSound() { playTone(800, 'sine', 0.05); }
        function playClearSound() { playTone(523.25, 'sine', 0.1); setTimeout(() => { playTone(659.25, 'sine', 0.15); }, 100); }
        function playMissSound() { playTone(150, 'sawtooth', 0.15); }
        function playTimeUpSound() { playTone(523.25, 'sine', 0.1); setTimeout(() => playTone(659.25, 'sine', 0.1), 100); setTimeout(() => playTone(783.99, 'sine', 0.1), 200); setTimeout(() => playTone(1046.50, 'sine', 0.3), 300); }

        fileInput.addEventListener('change', (e) => {
            // 💡 【重要修正】ファイルが1つも選ばれていない、またはキャンセルされたらここで終了する
            if (!e.target.files || e.target.files.length === 0) return;
            
            // 💡 【重要修正】正しく1番目のファイルオブジェクトを取得する
            const file = e.target.files[0]; 
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result; const lines = text.replace(/\r\n/g, '\n').split('\n');
                words = []; 
                for (let i = 0; i < lines.length; i += 3) {
                    const ja = lines[i]?.trim(); const en = lines[i+1]?.trim();  
                    if (ja && en) words.push({ japanese: ja, english: en });
                }
                if (words.length > 0) {
                    messageDisplay.style.color = 'green'; messageDisplay.textContent = `問題を ${words.length} 問読み込みました！`;
                    fileArea.style.display = 'none'; startBtn.style.display = 'inline-block'; 
                }
            };
            reader.readAsText(file);
        });

        startBtn.addEventListener('click', () => {
            isPlaying = true; timeLeft = 30; totalCorrectTypes = 0; totalMissTypes = 0;
            startBtn.style.display = 'none'; statusContainer.style.display = 'block'; wordDisplay.style.display = 'block';
            timerDisplay.textContent = timeLeft; messageDisplay.textContent = '';
            playTone(440, 'sine', 0.01); setWord(); startTimer();
        });

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--; timerDisplay.textContent = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            isPlaying = false; clearInterval(timerInterval);
            wordDisplay.style.display = 'none'; japaneseDisplay.textContent = '';
            playTimeUpSound();

            const wpm = totalCorrectTypes * 2; 
            const totalKeys = totalCorrectTypes + totalMissTypes;
            const accuracy = totalKeys > 0 ? Math.round((totalCorrectTypes / totalKeys) * 100) : 0;

            messageDisplay.innerHTML = `<strong>【タイムアップ！】結果をブラウザに記録しました</strong><br>速度: <strong>${wpm}</strong> WPM / 正確さ: ${accuracy} %`;
            startBtn.textContent = 'もう一度遊ぶ'; startBtn.style.display = 'inline-block';

            saveLog(wpm);
        }

        function saveLog(wpm) {
            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            let history = JSON.parse(localStorage.getItem('typing_history')) || [];
            history.push({ time: timeStr, wpm: wpm });
            localStorage.setItem('typing_history', JSON.stringify(history));
            updateChart();
        }

        function updateChart() {
            if (typeof Chart === 'undefined') return;

            let history = JSON.parse(localStorage.getItem('typing_history')) || [];
            const labels = history.map(item => item.time); 
            const dataValues = history.map(item => item.wpm); 

            const ctx = document.getElementById('scoreChart').getContext('2d');

            if (myChart) { myChart.destroy(); }

            myChart = new Chart(ctx, {
                type: 'line', 
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'タイピング速度 (WPM)',
                        data: dataValues,
                        borderColor: '#008CBA',
                        backgroundColor: 'rgba(0, 140, 186, 0.1)',
                        borderWidth: 2,
                        tension: 0.1,
                        lineTension: 0.1 
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, max: 200 },
                        yAxes: [{ ticks: { beginAtZero: true, max: 200 } }] 
                    }
                }
            });
        }

        document.getElementById('reset-btn').addEventListener('click', () => {
            if(confirm("今までの記録をすべて消去しますか？")) {
                localStorage.removeItem('typing_history');
                updateChart();
            }
        });

        function setWord() {
            if (!isPlaying) return;
            currentQuestion = words[Math.floor(Math.random() * words.length)];
            japaneseDisplay.textContent = currentQuestion.japanese; currentWord = currentQuestion.english; charIndex = 0;
            updateDisplay();
        }

        function updateDisplay() {
            let html = '';
            for (let i = 0; i < currentWord.length; i++) {
                html += (i < charIndex) ? `<span class="correct">${currentWord[i]}</span>` : `<span>${currentWord[i]}</span>`;
            }
            wordDisplay.innerHTML = html;
        }

        window.addEventListener('keydown', (e) => {
            if (!isPlaying || e.key.length > 1) return;
            if (e.key === currentWord[charIndex]) {
                charIndex++; totalCorrectTypes++; playTypeSound(); updateDisplay();
                if (charIndex === currentWord.length) { playClearSound(); setWord(); }
            } else {
                totalMissTypes++; playMissSound();
                gameBody.classList.add('miss-flash'); setTimeout(() => { gameBody.classList.remove('miss-flash'); }, 100);
            }
        });

        setTimeout(updateChart, 100);
    </script>
</body>
</html>
